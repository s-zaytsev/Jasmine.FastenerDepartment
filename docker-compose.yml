services:
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build: ./Jasmine.FastenerDepartment.Wpf
    ports:
      - "5034:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=Jasmine.FastenerDepartment;Username=postgres;Password=postgres
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build: ./jasmine-fastener-department-react
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./jasmine-fastener-department-react:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - backend 
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge